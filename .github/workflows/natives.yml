name: Build Natives

# Rebuilds the native connector libraries from source on each host platform and
# uploads them as artifacts. These binaries are otherwise committed by hand under
# natives-publish/src/main/resources/natives/<identifier>/, so this workflow is
# the reproducible way to refresh them.
#
# Only the three host-native targets the build script supports are covered here
# (win-x86-64, linux-x86-64, darwin). The cross-compiled variants (win-x86, the
# linux arm/aarch/musl targets) are not produced by natives/natives.gradle and
# would need a dedicated cross-compilation job.

on:
  workflow_dispatch:
  push:
    branches: [ '**' ]
    paths:
      - 'natives/**'
      - '.github/workflows/natives.yml'

jobs:
  build:
    name: ${{ matrix.identifier }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            identifier: win-x86-64
            library: connector.dll
          - os: ubuntu-latest
            identifier: linux-x86-64
            library: libconnector.so
          - os: macos-latest
            identifier: darwin
            library: libconnector.dylib

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 25
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Windows and macOS runners ship CMake; on Linux install it along with the
      # autotools the opus/ogg/mpg123 source builds invoke (./configure, make,
      # and `automake --version` for the mpg123 version-patching step).
      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential automake autoconf libtool

      - name: Build natives
        # The bundled CMakeLists declare cmake_minimum_required(VERSION 3.15);
        # CMAKE_POLICY_VERSION_MINIMUM keeps CMake 4 runners from rejecting any
        # older minimums pulled in from downloaded codec sources.
        env:
          CMAKE_POLICY_VERSION_MINIMUM: '3.5'
        run: ./gradlew :natives:compileNatives --no-daemon

      - name: Verify connector was produced
        shell: bash
        run: |
          target="natives-publish/src/main/resources/natives/${{ matrix.identifier }}/${{ matrix.library }}"
          if [ ! -f "$target" ]; then
            echo "Expected native library not found: $target" >&2
            exit 1
          fi
          echo "Built $target ($(wc -c < "$target") bytes)"

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: connector-${{ matrix.identifier }}
          path: natives-publish/src/main/resources/natives/${{ matrix.identifier }}/
          if-no-files-found: error
